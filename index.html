<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XNOT Stone Skipper V5.1</title>
    <style>
        :root { --primary: #deff9a; --bg: #0f172a; --danger: #ef4444; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: var(--bg); color: white; user-select: none; -webkit-user-select: none; }
        
        #game-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background-image: url('images/bg_stage_1.png');
            background-size: cover;
            background-position: center;
            background-color: #0284c7; 
            overflow: hidden; 
        }

        .asset-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 200; pointer-events: none; }
        .asset-box { background: rgba(15, 23, 42, 0.8); padding: 10px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        #hearts-count { color: var(--danger); }
        #sp-count { color: var(--primary); }

        .bounce-point {
            position: absolute; width: 35px; height: 18px;
            background: rgba(255, 255, 255, 0.7); border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; color: #0284c7;
            z-index: 50; box-shadow: 0 0 8px white;
        }

        .ripple {
            position: absolute; border: 3px solid rgba(255,255,255,0.8); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
            animation: ripple-out 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            z-index: 40;
        }
        @keyframes ripple-out {
            from { width: 10px; height: 5px; opacity: 1; }
            to { width: 180px; height: 90px; opacity: 0; }
        }

        /* 인게임 돌 레이어 최상위 보장 */
        #ingame-stone {
            position: absolute; 
            top: 80%; 
            left: 50%; 
            width: 90px; 
            height: 60px;
            background-color: #555; 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(1);
            cursor: grab; 
            z-index: 999; 
            display: none; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #ingame-stone:active { cursor: grabbing; }

        .ui-layer { position: absolute; top: 90px; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 150; }
        #score-display { font-size: 44px; font-weight: 900; color: var(--primary); text-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        #message { font-size: 18px; color: white; margin-top: 10px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        #roulette-screen { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .wheel-container { width: 240px; height: 240px; border: 8px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 30px; background: #1e293b; box-shadow: 0 0 30px rgba(222,255,154,0.3); cursor: pointer; transition: transform 0.1s ease-out; }
        .pointer { position: absolute; top: -20px; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ef4444; z-index: 1100; }
        #stone-display-name { font-size: 24px; font-weight: bold; color: white; text-align: center; padding: 10px; pointer-events: none; }
        
        .action-btn { background: var(--primary); color: #0f172a; border: none; padding: 18px 60px; font-size: 22px; font-weight: bold; border-radius: 40px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-top: 10px; }

        #youtube-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }

        #swipe-guide { 
            position: absolute; 
            top: 68%; 
            width: 100%; 
            text-align: center; 
            color: var(--primary); 
            font-size: 20px; 
            font-weight: bold; 
            animation: arrow-up 1.2s infinite; 
            pointer-events: none; 
            display: none; 
            z-index: 900;
        }
        @keyframes arrow-up { 0% { transform: translateY(10px); opacity: 0.3; } 50% { transform: translateY(-10px); opacity: 1; } 100% { transform: translateY(10px); opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="asset-bar">
            <div class="asset-box">❤️ 하트: <span id="hearts-count">5</span> / 5</div>
            <div class="asset-box">💎 <span id="sp-count">0</span> SP</div>
        </div>

        <div id="roulette-screen">
            <h2 id="roulette-title" style="color:var(--primary); margin-bottom:20px; text-align:center; padding: 0 20px;">TOUCH THE WHEEL TO START CHANCE</h2>
            <div class="pointer"></div>
            <div id="roulette-wheel" class="wheel-container">
                <div id="stone-display-name">돌 뽑기 터치!</div>
            </div>
            <p id="stone-desc" style="color: #94a3b8; font-size: 15px; margin-top: -15px; margin-bottom: 30px; text-align: center; padding: 0 20px; min-height: 40px;"></p>
            <button id="main-action-btn" class="action-btn">SPIN WHEEL</button>
        </div>

        <div id="youtube-modal">
            <h2 style="color:#ef4444;">유튜브 광고 시청 중...</h2>
            <p style="color:#94a3b8; font-size:16px; margin-bottom:30px;">하트를 충전하기 위해 영상을 시청하고 있습니다.</p>
            <div id="video-timer" style="font-size:48px; font-weight:bold; color:white; margin-bottom:40px;">5</div>
            <p style="color:var(--primary)">시청 완료 시 하트 5개가 완충됩니다.</p>
        </div>

        <div class="ui-layer">
            <div id="score-display">READY</div>
            <div id="message">채굴 준비 완료</div>
        </div>
        
        <div id="swipe-guide">▲ SWIPE UP FAST! ▲</div>
        <div id="ingame-stone"></div>
    </div>

    <script>
        const stones = [
            { name: "평범한 조약돌", image: "images/stone_ordinary.png", mult: 1.0, luck: 0.1, desc: "표준 성능의 무난한 기본 조약돌" },
            { name: "거친 현무암", image: "images/stone_rare.png", mult: 0.6, luck: 0.6, desc: "낮은 확률이지만 대박나면 대량 채굴 가능한 도박성 돌" },
            { name: "슬레이트 판암", image: "images/stone_legendary.png", mult: 1.5, luck: 0.05, desc: "안정적인 각도로 평균 튕김 수가 매우 높음 (효율형)" },
            { name: "황금빛 운석", image: "images/stone_mythic.png", mult: 2.5, luck: 0.8, desc: "신화급 확률로 수평선을 뚫는 극대량 채굴석" }
        ];

        let playerHearts = 5;
        let playerSP = 0;

        let selectedStone = null;
        let isSpinning = false;
        let startY = 0;
        let startTime = 0;
        let isPlaying = false;
        let currentStatus = "PRE_SPIN"; 

        const rouletteScreen = document.getElementById('roulette-screen');
        const wheelEl = document.getElementById('roulette-wheel');
        const stoneDisplayName = document.getElementById('stone-display-name');
        const stoneDesc = document.getElementById('stone-desc');
        const mainBtn = document.getElementById('main-action-btn');
        const ingameStoneEl = document.getElementById('ingame-stone');
        const scoreDisplay = document.getElementById('score-display');
        const message = document.getElementById('message');
        const container = document.getElementById('game-container');
        
        const heartsCountEl = document.getElementById('hearts-count');
        const spCountEl = document.getElementById('sp-count');
        const youtubeModal = document.getElementById('youtube-modal');
        const videoTimerEl = document.getElementById('video-timer');

        // [순정 V3.0] 자산 UI 매커니즘
        function updateAssetUI() {
            heartsCountEl.innerText = playerHearts;
            spCountEl.innerText = playerSP.toLocaleString();
            
            if (playerHearts <= 0 && currentStatus === "PRE_SPIN") {
                document.getElementById('roulette-title').innerText = "하트 부족! 에너지를 충전하세요.";
                mainBtn.innerText = "❤️ 유튜브 시청하고 하트 완충";
                mainBtn.style.background = "#ef4444";
                mainBtn.style.color = "white";
            }
        }

        // [순정 V3.0] 룰렛 회전 완벽 복원
        function triggerWheel(e) {
            if (e) e.preventDefault();
            if (playerHearts <= 0) {
                openYoutubeCharge();
                return;
            }
            if (isSpinning || currentStatus !== "PRE_SPIN") return;
            isSpinning = true;
            let tick = 0;
            
            const timer = setInterval(() => {
                const current = stones[Math.floor(Math.random() * stones.length)];
                stoneDisplayName.innerText = current.name;
                stoneDesc.innerText = current.desc;
                
                wheelEl.style.transform = `rotate(${tick * 45}deg)`;
                tick++;
                
                if(tick > 12) {
                    clearInterval(timer);
                    selectedStone = current;
                    wheelEl.style.transform = `rotate(0deg)`; 
                    stoneDisplayName.innerText = selectedStone.name;
                    
                    ingameStoneEl.style.backgroundImage = `url('${selectedStone.image}')`;
                    
                    document.getElementById('roulette-title').innerText = "STONE READY!";
                    mainBtn.innerText = "LAUNCH STONE (❤️ 1 소모)";
                    mainBtn.style.background = "#deff9a";
                    mainBtn.style.color = "#0f172a";
                    currentStatus = "SPIN_DONE";
                    isSpinning = false;
                }
            }, 90);
        }

        wheelEl.onclick = triggerWheel;
        mainBtn.onclick = (e) => {
            e.preventDefault();
            if (playerHearts <= 0 && currentStatus === "PRE_SPIN") {
                openYoutubeCharge();
                return;
            }

            if (currentStatus === "PRE_SPIN") {
                triggerWheel();
            } else if (currentStatus === "SPIN_DONE") {
                playerHearts--; 
                updateAssetUI();

                rouletteScreen.style.display = 'none'; 
                
                // 돌 영점 재확보 및 노출
                ingameStoneEl.style.top = '80%';
                ingameStoneEl.style.left = '50%';
                ingameStoneEl.style.transform = 'translate(-50%, -50%) scale(1)';
                ingameStoneEl.style.opacity = '1';
                ingameStoneEl.style.display = 'block';
                
                document.getElementById('swipe-guide').style.display = 'block';
                scoreDisplay.innerText = "0 SKIPS";
                message.innerText = "SWIPE UP FAST!";
                isPlaying = true;
                currentStatus = "PLAYING";
            }
        };

        function openYoutubeCharge() {
            youtubeModal.style.display = "flex";
            let timeLeft = 5;
            videoTimerEl.innerText = timeLeft;
            
            const adTimer = setInterval(() => {
                timeLeft--;
                videoTimerEl.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(adTimer);
                    playerHearts = 5;
                    youtubeModal.style.display = "none";
                    
                    document.getElementById('roulette-title').innerText = "TOUCH THE WHEEL TO START CHANCE";
                    mainBtn.innerText = "SPIN WHEEL";
                    mainBtn.style.background = "var(--primary)";
                    mainBtn.style.color = "#0f172a";
                    
                    updateAssetUI();
                }
            }, 1000);
        }

        // [안정화] 스와이프 입력 장치
        function onDragStart(e) {
            if(!isPlaying) return;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            startTime = Date.now();
        }

        function onDragEnd(e) {
            if(!isPlaying) return;
            const endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const dist = startY - endY; 
            const duration = Date.now() - startTime;
            
            if (dist > 10) {
                let speed = dist / (duration || 1);
                launchStone(speed);
            }
        }

        ingameStoneEl.addEventListener('touchstart', onDragStart, { passive: true });
        ingameStoneEl.addEventListener('touchend', onDragEnd, { passive: true });
        ingameStoneEl.addEventListener('mousedown', onDragStart);
        ingameStoneEl.addEventListener('mouseup', onDragEnd);

        function launchStone(speed) {
            isPlaying = false;
            document.getElementById('swipe-guide').style.display = 'none';
            
            let totalBounces = Math.floor(speed * 9 * selectedStone.mult);
            if(Math.random() < selectedStone.luck) {
                totalBounces = Math.floor(totalBounces * 2.2);
                message.innerText = "⚡ CRITICAL LUCKY HIT! ⚡";
            } else {
                message.innerText = "NICE SHOT!";
            }
            if(totalBounces < 3) totalBounces = 3; 

            animateSkipping(totalBounces);
        }

        // [★화면 얼지 않는 프레임 제어 엔진 전환]
        function animateSkipping(total) {
            const startYPosition = window.innerHeight * 0.8; 
            const horizonY = window.innerHeight * 0.35;       
            const totalDistanceY = startYPosition - horizonY;
            
            let currentBounce = 0;
            let stepStartTime = Date.now();
            
            // 첫 포인트 생성
            createBounceEffect(window.innerWidth / 2, startYPosition, 1);

            function frameLoop() {
                const now = Date.now();
                // 원본 V3.0의 촘촘해지는 타이밍 공식을 프레임 단위로 반영
                const stepDuration = 120 + ((currentBounce / total) * 120);
                const progressInStep = (now - stepStartTime) / stepDuration;

                if (progressInStep >= 1) {
                    currentBounce++;
                    stepStartTime = now;

                    if (currentBounce < total) {
                        const progress = (currentBounce + 1) / total;
                        const currentY = startYPosition - (totalDistanceY * Math.pow(progress, 0.65));
                        const currentX = window.innerWidth / 2;
                        
                        createBounceEffect(currentX, currentY, currentBounce + 1);
                        scoreDisplay.innerText = `${currentBounce + 1} SKIPS`;
                    }
                }

                // 실시간 위치 보간 연산 및 스케일 축소
                const totalProgress = Math.min((currentBounce + Math.min(progressInStep, 1)) / total, 1);
                const currentY = startYPosition - (totalDistanceY * Math.pow(totalProgress, 0.65));
                const currentX = window.innerWidth / 2;
                const scale = 1 - (totalProgress * 0.65);

                ingameStoneEl.style.transform = `translate(-50%, -50%) scale(${scale})`;
                ingameStoneEl.style.left = `${currentX}px`;
                ingameStoneEl.style.top = `${currentY}px`;

                if (currentBounce < total - 1 || (currentBounce === total - 1 && progressInStep < 1)) {
                    requestAnimationFrame(frameLoop);
                } else {
                    // 비행 종료 후 자연스러운 침몰 연출 마감
                    ingameStoneEl.style.transition = "opacity 0.5s ease-out, top 0.5s ease-out";
                    ingameStoneEl.style.top = `${currentY + 40}px`;
                    ingameStoneEl.style.opacity = '0';

                    const minedSP = total * 1000;
                    playerSP += minedSP;
                    updateAssetUI();
                    
                    message.innerText = `🎉 +${minedSP.toLocaleString()} SP 채굴 완료!`;
                    
                    setTimeout(() => {
                        document.querySelectorAll('.bounce-point').forEach(p => p.remove());
                        ingameStoneEl.style.transition = "none"; 
                        ingameStoneEl.style.display = 'none';
                        
                        // 완벽한 루프 리셋 (2회차 먹통 방지)
                        stoneDisplayName.innerText = "돌 뽑기 터치!";
                        stoneDesc.innerText = "다음 기회를 위해 돌을 다시 뽑으세요.";
                        mainBtn.innerText = "SPIN WHEEL";
                        
                        currentStatus = "PRE_SPIN";
                        rouletteScreen.style.display = 'flex';
                        updateAssetUI();
                    }, 1800);
                }
            }

            requestAnimationFrame(frameLoop);
        }

        function createBounceEffect(x, y, count) {
            const point = document.createElement('div');
            point.className = 'bounce-point';
            point.style.left = `${x}px`;
            point.style.top = `${y}px`;
            point.innerText = count;
            container.appendChild(point);

            const rip = document.createElement('div');
            rip.className = 'ripple';
            rip.style.left = `${x}px`;
            rip.style.top = `${y}px`;
            container.appendChild(rip);
        }

        updateAssetUI();
    </script>
</body>
</html>
