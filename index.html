<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XNOT Stone Skipper Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div class="asset-bar">
            <div class="asset-box">❤️ 하트: <span id="hearts-count">5</span> / 5</div>
            <div class="asset-box">💎 <span id="sp-count">0</span> SP</div>
        </div>

        <div id="roulette-screen">
            <h2 id="roulette-title">TOUCH THE WHEEL TO START CHANCE</h2>
            <div class="wheel-wrapper">
                <div class="wheel-frame"></div>
                <div class="pointer"></div>
                <div id="roulette-wheel"></div>
            </div>
            <div class="stone-info-container">
                <div id="stone-display-name">돌 뽑기 터치!</div>
                <p id="stone-desc">다음 기회를 위해 돌을 다시 뽑으세요.</p>
            </div>
            <button id="main-action-btn" class="action-btn">SPIN WHEEL</button>
        </div>

        <div id="youtube-modal">
            <h2 class="ad-title">유튜브 광고 시청 중...</h2>
            <p class="ad-desc">하트를 충전하기 위해 영상을 시청하고 있습니다.</p>
            <div id="video-timer">5</div>
            <p class="ad-reward">시청 완료 시 하트 5개가 완충됩니다.</p>
        </div>

        <div class="ui-layer">
            <div id="score-display">READY</div>
            <div id="message">채굴 준비 완료</div>
        </div>
        
        <div id="swipe-guide">▲ SWIPE UP FAST! ▲</div>
        <div id="ingame-stone"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
